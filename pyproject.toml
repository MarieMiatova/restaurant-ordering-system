[tool.ruff]
# Целевая версия Python
target-version = "py311"

# Ширина строки (стандарт 88, но 100 или 120 удобнее для современных мониторов)
line-length = 100

[tool.ruff.lint]
# Список проверок
# E, F - базовые ошибки и нарушения стиля (Flake8)
# I - сортировка импортов (Isort)
# B - поиск потенциальных багов (flake8-bugbear)
# C90 - проверка сложности кода
select = ["E", "F", "I", "B", "C90"]

# Что игнорировать - B008 это стандартная практика FastAPI для Depends
ignore = ["B008"]

[tool.ruff.lint.mccabe]
# Максимальная цикломатическая сложность (насколько "запутан" код)
max-complexity = 10

[tool.ruff.format]
# Настройки форматирования
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint.isort]
# Автоматически группировать импорты
combine-as-imports = true

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["backend/tests"]
python_files = "test_*.py"
filterwarnings = [
    "ignore::DeprecationWarning",
]

